<!-- ═══════════════════════════════════════════════════════════════════════════
     ESTILOS CSS GLOBALES - TEMA OSCURO
     ═══════════════════════════════════════════════════════════════════════════ -->
<style>
  :root {
    --primary: #667eea;
    --primary-dark: #818cf8;
    --secondary: #a78bfa;
    --success: #22c55e;
    --warning: #fbbf24;
    --danger: #ef4444;
    --dark: #0f172a;
    --dark-card: #1e293b;
    --dark-section: #1e293b;
    --gray: #94a3b8;
    --text-primary: #f1f5f9;
    --text-secondary: #cbd5e1;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    line-height: 1.7;
    color: var(--text-primary);
    background: linear-gradient(135deg, #1e1b4b 0%, #312e81 100%);
    min-height: 100vh;
  }
  .container { max-width: 1000px; margin: 0 auto; padding: 20px; }

  .hero {
    background: linear-gradient(135deg, rgba(30, 27, 75, 0.95), rgba(49, 46, 129, 0.95));
    color: white; padding: 60px 40px; border-radius: 24px; text-align: center;
    margin-bottom: 30px; box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    border: 1px solid rgba(139, 92, 246, 0.3);
  }
  .hero h1 { font-size: 2.8em; margin-bottom: 15px; text-shadow: 2px 2px 4px rgba(0,0,0,0.4); color: #e0e7ff; }
  .hero .subtitle { font-size: 1.3em; opacity: 0.95; color: #c7d2fe; }
  .hero .badge { display: inline-block; background: rgba(139, 92, 246, 0.3); padding: 8px 20px; border-radius: 30px; margin-bottom: 20px; border: 1px solid rgba(139, 92, 246, 0.5); }

  .content-card { background: var(--dark-card); border-radius: 20px; padding: 40px; margin-bottom: 30px; box-shadow: 0 10px 40px rgba(0,0,0,0.3); color: var(--text-primary); border: 1px solid rgba(139, 92, 246, 0.2); }
  
  .section { background: var(--dark-section); border-radius: 20px; padding: 35px 35px 45px 35px; margin-bottom: 50px; box-shadow: 0 4px 20px rgba(0,0,0,0.3); color: var(--text-primary); border: 1px solid rgba(139, 92, 246, 0.15); }
  .section-header { display: flex; align-items: center; gap: 20px; margin-bottom: 25px; padding-bottom: 20px; border-bottom: 3px solid var(--primary); }
  .section-number {
    background: linear-gradient(135deg, var(--primary), var(--secondary));
    color: white; width: 55px; height: 55px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.5em; font-weight: bold; box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
  }
  .section-title h2 { color: var(--primary-dark); font-size: 1.6em; margin-bottom: 5px; }
  .section-title p { color: var(--gray); font-size: 1em; }

  .highlight { background: linear-gradient(135deg, #312e81, #3730a3); border-left: 5px solid var(--primary); padding: 20px 25px; border-radius: 0 12px 12px 0; margin: 25px 0; display: flex; align-items: flex-start; gap: 15px; color: #e0e7ff; }
  .highlight .icon { font-size: 1.8em; flex-shrink: 0; }
  .highlight.success { background: linear-gradient(135deg, #14532d, #166534); border-left-color: var(--success); color: #dcfce7; }
  .highlight.warning { background: linear-gradient(135deg, #78350f, #92400e); border-left-color: var(--warning); color: #fef3c7; }

  .code-block { background: #0f172a; border-radius: 12px; padding: 20px; margin: 20px 0; overflow-x: auto; border: 1px solid rgba(139, 92, 246, 0.2); }
  .code-block pre { color: #e2e8f0; font-family: 'Consolas', monospace; font-size: 0.9em; line-height: 1.6; margin: 0; }
  .code-block .comment { color: #94a3b8; }
  .code-block .keyword { color: #c084fc; }
  .code-block .number { color: #fbbf24; }
  .code-block .string { color: #86efac; }

  .formula-box { background: linear-gradient(135deg, #78350f, #92400e); border: 2px solid #fbbf24; border-radius: 12px; padding: 25px; margin: 20px 0; text-align: center; }
  .formula-box .formula { font-size: 1.4em; color: #fef3c7; font-family: 'Times New Roman', serif; margin: 15px 0; }

  .grid-2 { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; margin: 20px 0; }
  .grid-3 { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; margin: 20px 0; }

  .comparison-table { width: 100%; border-collapse: collapse; margin: 20px 0; font-size: 0.95em; }
  .comparison-table th { background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; padding: 15px; text-align: left; }
  .comparison-table td { padding: 12px 15px; border-bottom: 1px solid rgba(139, 92, 246, 0.2); color: var(--text-secondary); }
  .comparison-table tr:nth-child(even) { background: rgba(139, 92, 246, 0.1); }
  .comparison-table tr:nth-child(odd) { background: rgba(0,0,0,0.2); }

  .analogy { background: linear-gradient(135deg, #1e293b, #334155); border-radius: 12px; padding: 20px; margin: 20px 0; display: flex; align-items: flex-start; gap: 15px; border: 1px solid rgba(236, 72, 153, 0.3); color: #fce7f3; }
  .analogy .icon { font-size: 2em; flex-shrink: 0; }
  .analogy-title { font-weight: bold; color: #f472b6; margin-bottom: 5px; }

  .exec-prompt { background: linear-gradient(135deg, #78350f, #92400e); padding: 15px 20px; border-radius: 12px; margin-bottom: 25px; display: flex; align-items: center; gap: 15px; border-left: 4px solid #fbbf24; }
  .exec-prompt .icon { font-size: 1.8em; }
  .exec-prompt strong { color: #fbbf24; }
  .exec-prompt .sub { font-size: 0.9em; color: #fde68a; }

  .nav-btn { display: inline-flex; align-items: center; gap: 10px; padding: 15px 30px; background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; text-decoration: none; border-radius: 12px; font-weight: bold; transition: transform 0.2s; }
  .nav-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4); }

  /* Override para elementos inline con fondos claros */
  strong { color: inherit; }
  
  /* Forward Pass Animation Particles */
  .fp-particle {
    filter: drop-shadow(0 0 4px currentColor);
  }
  
  @media (max-width: 768px) { .hero h1 { font-size: 2em; } .container { padding: 15px; } .section { padding: 25px; } .grid-2, .grid-3 { grid-template-columns: 1fr; } }
</style>

<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Capítulo 0: Fundamentos de Redes Neuronales</title>
  <style>
    /* ===== ESTILOS BASE ===== */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #1e1e2e 0%, #2d2d44 100%);
      color: #e0e0e0;
      line-height: 1.6;
    }
    
    .container {
      max-width: 1000px;
      margin: 0 auto;
      padding: 20px;
    }
    
    /* ===== HERO ===== */
    .hero {
      text-align: center;
      padding: 60px 20px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border-radius: 20px;
      margin-bottom: 30px;
      box-shadow: 0 10px 40px rgba(102, 126, 234, 0.3);
    }
    
    .hero h1 {
      font-size: 2.5em;
      margin-bottom: 15px;
      color: white;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
    }
    
    .hero p {
      font-size: 1.2em;
      opacity: 0.95;
      color: white;
    }
    
    /* ===== SECCIONES ===== */
    .section {
      background: #2a2a40;
      border-radius: 16px;
      padding: 30px;
      margin-bottom: 25px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    }
    
    .section-header {
      display: flex;
      align-items: center;
      gap: 15px;
      margin-bottom: 20px;
    }
    
    .section-number {
      width: 45px;
      height: 45px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.3em;
      font-weight: bold;
      color: white;
    }
    
    .section-title h2 {
      font-size: 1.4em;
      color: #a5b4fc;
    }
    
    .section-title p {
      font-size: 0.9em;
      color: #9ca3af;
    }
    
    /* ===== ANALOGÍAS ===== */
    .analogy {
      background: linear-gradient(135deg, #374151, #1f2937);
      border-left: 4px solid #fbbf24;
      padding: 20px;
      border-radius: 0 12px 12px 0;
      margin: 20px 0;
    }
    
    .analogy .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }
    
    .analogy .header .icon {
      font-size: 1.5em;
    }
    
    .analogy .header .title {
      font-weight: bold;
      color: #fbbf24;
    }
    
    /* ===== HIGHLIGHTS ===== */
    .highlight {
      display: flex;
      align-items: flex-start;
      gap: 15px;
      padding: 20px;
      border-radius: 12px;
      margin: 15px 0;
      border-left: 4px solid;
    }
    
    .highlight.info {
      background: rgba(59, 130, 246, 0.15);
      border-color: #3b82f6;
    }
    
    .highlight.warning {
      background: rgba(251, 191, 36, 0.15);
      border-color: #fbbf24;
    }
    
    .highlight.success {
      background: rgba(34, 197, 94, 0.15);
      border-color: #22c55e;
    }
    
    .highlight .icon {
      font-size: 1.5em;
    }
    
    /* ===== ECUACIONES ===== */
    .equation {
      background: linear-gradient(135deg, #1e293b, #0f172a);
      padding: 25px;
      border-radius: 12px;
      text-align: center;
      margin: 20px 0;
      font-family: 'Times New Roman', serif;
      font-size: 1.4em;
      color: #60a5fa;
      border: 1px solid rgba(96, 165, 250, 0.3);
    }
    
    /* ===== CÓDIGO ===== */
    .code-block {
      background: #0f172a;
      border-radius: 12px;
      padding: 20px;
      margin: 15px 0;
      overflow-x: auto;
      border: 1px solid rgba(139, 92, 246, 0.3);
    }
    
    .code-block pre {
      font-family: 'Fira Code', 'Consolas', monospace;
      font-size: 0.9em;
      line-height: 1.5;
      color: #e2e8f0;
    }
    
    .code-block .keyword { color: #c084fc; }
    .code-block .string { color: #86efac; }
    .code-block .number { color: #fbbf24; }
    .code-block .comment { color: #6b7280; font-style: italic; }
    .code-block .function { color: #60a5fa; }
    
    /* ===== GRIDS ===== */
    .grid-2 {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 15px;
      margin: 20px 0;
    }
    
    .grid-3 {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 15px;
      margin: 20px 0;
    }
    
    @media (max-width: 768px) {
      .grid-2, .grid-3 {
        grid-template-columns: 1fr;
      }
    }
    
    /* ===== NOTEBOOK PROMPTS ===== */
    .exec-prompt {
      background: linear-gradient(135deg, #fef3c7, #fde68a);
      border-left: 4px solid #f59e0b;
      padding: 15px 20px;
      border-radius: 0 12px 12px 0;
      margin: 20px 0;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    
    .exec-prompt .icon {
      font-size: 1.3em;
    }
    
    .exec-prompt strong {
      color: #92400e;
    }
    
    .exec-prompt .sub {
      font-size: 0.85em;
      color: #a16207;
      margin-top: 5px;
    }
    
    /* ===== NAV BUTTON ===== */
    .nav-btn {
      display: inline-flex;
      text-decoration: none;
      background: linear-gradient(135deg, #3b82f6, #1d4ed8);
      color: white;
      padding: 15px 30px;
      border-radius: 12px;
      font-weight: bold;
      font-size: 1.1em;
      box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4);
      transition: transform 0.2s, box-shadow 0.2s;
    }
    
    .nav-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(59, 130, 246, 0.5);
    }
    
    /* ===== LOADING ===== */
    .loading-section {
      text-align: center;
      padding: 40px;
      color: #9ca3af;
    }
    
    .loading-section .spinner {
      display: inline-block;
      width: 40px;
      height: 40px;
      border: 4px solid rgba(139, 92, 246, 0.3);
      border-top-color: #8b5cf6;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 15px;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="container">
    
    <!-- HERO -->
    <div class="hero">
      <h1>🧠 Capítulo 0</h1>
      <h2 style="font-size: 1.8em; margin-bottom: 20px; color: white;">Fundamentos de Redes Neuronales</h2>
      <p>De la neurona básica al entrenamiento completo — todo lo que necesitas antes de GNNs</p>
      <div style="margin-top: 25px; padding: 15px; background: rgba(255,255,255,0.2); border-radius: 10px; display: inline-block;">
        <span style="font-size: 1.1em;">📓 Abre el notebook: <code style="background: rgba(0,0,0,0.3); padding: 5px 10px; border-radius: 5px;">Chapter0_Notebook.ipynb</code></span>
      </div>
    </div>
    
    <!-- Contenedor para secciones cargadas dinámicamente -->
    <div id="sections-container">
      <div class="loading-section">
        <div class="spinner"></div>
        <p>Cargando contenido...</p>
      </div>
    </div>
    
  </div>

  <script>
    /**
     * Sistema de carga modular para Chapter 0
     * Carga cada sección HTML de forma secuencial
     */
    
    const sectionFiles = [
      'chapter0_sections/02_intro.html',
      'chapter0_sections/03_section1_neurona.html',
      'chapter0_sections/04_section2_regresion.html',
      'chapter0_sections/05_section2.5_clasificacion.html',
      'chapter0_sections/06_section2.6_frontera.html',
      'chapter0_sections/07_section2.7_capas_ocultas.html',
      'chapter0_sections/08_section3_circulo.html',
      'chapter0_sections/09_sections4_9.html',
      'chapter0_sections/10_section10_loop.html',
      'chapter0_sections/11_simulator_complete.html',
      'chapter0_sections/12_summary_footer.html'
    ];
    
    const scriptFiles = [
      'chapter0_sections/js/simulator1.js',
      'chapter0_sections/js/simulator2.js'
    ];
    
    async function loadSections() {
      const container = document.getElementById('sections-container');
      container.innerHTML = '';
      
      for (const file of sectionFiles) {
        try {
          const response = await fetch(file);
          if (response.ok) {
            const html = await response.text();
            const div = document.createElement('div');
            div.innerHTML = html;
            container.appendChild(div);
          } else {
            console.warn(`No se pudo cargar: ${file}`);
          }
        } catch (error) {
          console.error(`Error cargando ${file}:`, error);
        }
      }
      
      // Cargar scripts después de que el HTML esté listo
      for (const scriptFile of scriptFiles) {
        try {
          const script = document.createElement('script');
          script.src = scriptFile;
          document.body.appendChild(script);
        } catch (error) {
          console.error(`Error cargando script ${scriptFile}:`, error);
        }
      }
    }
    
    // Iniciar carga cuando el DOM esté listo
    document.addEventListener('DOMContentLoaded', loadSections);
  </script>
</body>
</html>
